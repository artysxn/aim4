<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AIM4 Football</title>
<style>
  /* Design tokens mirrored from src/style.css so the page reads as AIM4.io. */
  @font-face {
    font-family: 'Host Grotesk';
    src: url('/fonts/host_grotesk/HostGrotesk-Regular.ttf') format('truetype');
    font-weight: 400; font-style: normal; font-display: swap;
  }
  @font-face {
    font-family: 'Host Grotesk';
    src: url('/fonts/host_grotesk/HostGrotesk-Medium.ttf') format('truetype');
    font-weight: 500; font-style: normal; font-display: swap;
  }
  @font-face {
    font-family: 'Host Grotesk';
    src: url('/fonts/host_grotesk/HostGrotesk-SemiBold.ttf') format('truetype');
    font-weight: 600; font-style: normal; font-display: swap;
  }
  :root {
    --bg: #0a0a0a;
    --panel: rgba(18, 18, 20, 0.94);
    --surface: rgba(255, 255, 255, 0.04);
    --surface-hover: rgba(255, 255, 255, 0.08);
    --border: rgba(255, 255, 255, 0.08);
    --border-strong: rgba(255, 255, 255, 0.16);
    --accent: #f52525;
    --accent-down: #d41f1f;
    --text: #f2f2f2;
    --muted: #9c9ca2;
    --radius: 12px;
    --radius-sm: 8px;
    --red: #ff5544;
    --blue: #4da3ff;
    --green: #37b26c;
    --font-body: 'Host Grotesk', 'Segoe UI', system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    overflow: hidden;
    user-select: none;
  }
  .view { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; }
  .hidden { display: none !important; }

  .title { font-size: 52px; font-weight: 600; letter-spacing: 0.5px; }
  .title .io { color: var(--accent); }
  .title .sub { font-weight: 400; color: var(--muted); }
  .tagline { color: var(--muted); font-size: 13px; margin-top: -12px; }
  .conn { font-size: 12px; min-height: 16px; color: var(--muted); }
  .conn.bad { color: var(--accent); }
  .msg { color: var(--accent); font-size: 13px; min-height: 18px; }

  input {
    font: inherit; font-size: 14px;
    color: var(--text);
    background: #17171a;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    outline: none;
    width: 100%;
  }
  input:focus { border-color: var(--border-strong); }
  input::placeholder { color: #5c5c62; }
  label.field { display: flex; flex-direction: column; gap: 6px; font-size: 12px; color: var(--muted); }
  label.check { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text); cursor: pointer; }
  label.check input { width: auto; accent-color: var(--accent); }

  .btn {
    font-family: var(--font-body);
    font-size: 14px; font-weight: 500;
    color: var(--text);
    background: #17171a;
    border: none;
    border-radius: var(--radius-sm);
    padding: 10px 20px;
    cursor: pointer;
    transition: background 0.15s ease, transform 0.06s ease;
  }
  .btn:hover { background: #212125; }
  .btn:active { background: #101012; transform: translateY(1px); }
  .btn.primary { background: linear-gradient(180deg, #ff3434, #e01d1d); color: #fff; }
  .btn.primary:hover { background: linear-gradient(180deg, #ff4a4a, #ef2424); }
  .btn.primary:active { background: var(--accent-down); }
  .btn.danger { color: #ffb4b4; background: rgba(255, 60, 60, 0.12); }
  .btn.danger:hover { background: rgba(255, 60, 60, 0.22); }
  .btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
  }
  .panel h2 {
    font-size: 13px; font-weight: 600; letter-spacing: 2px; color: var(--muted);
    padding-bottom: 10px; margin-bottom: 12px; border-bottom: 1px solid var(--border);
  }

  /* ---- Menu ---- */
  .menuPanels { display: flex; gap: 16px; width: min(880px, 94vw); align-items: stretch; }
  .createPanel { flex: 0 0 300px; display: flex; flex-direction: column; gap: 12px; }
  .createPanel .btn { margin-top: auto; }
  .browsePanel { flex: 1; display: flex; flex-direction: column; gap: 10px; min-height: 340px; }
  .lobbyList { flex: 1; display: flex; flex-direction: column; gap: 8px; overflow-y: auto; max-height: 300px; }
  .lobbyList .empty { color: var(--muted); font-size: 13px; text-align: center; padding: 30px 0; }
  .lobbyItem {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 14px;
    background: var(--surface);
    border-radius: var(--radius-sm);
    transition: background 0.15s ease;
  }
  .lobbyItem:hover { background: var(--surface-hover); }
  .lobbyItem .info { flex: 1; display: flex; flex-direction: column; gap: 2px; min-width: 0; }
  .lobbyItem .host { font-size: 15px; }
  .lobbyItem .meta { font-size: 12px; color: var(--muted); }
  .lobbyItem .btn { padding: 6px 16px; }
  .joinRow { display: flex; gap: 8px; }
  .joinRow input { width: 110px; text-align: center; text-transform: uppercase; letter-spacing: 3px; }
  .backLink { color: var(--muted); font-size: 12px; text-decoration: none; margin-top: 6px; }
  .backLink:hover { color: var(--text); }

  /* ---- Password modal ---- */
  .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 20; }
  .modalPanel { width: 320px; display: flex; flex-direction: column; gap: 12px; }
  .modalPanel .row { display: flex; gap: 8px; justify-content: flex-end; }

  /* ---- Lobby ---- */
  #lobby { justify-content: flex-start; padding: 42px 20px 24px; overflow-y: auto; }
  .lobbyHead { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .lobbyLabel { font-size: 12px; letter-spacing: 3px; color: var(--muted); margin-right: 12px; }
  .code {
    font-size: 38px; font-weight: 600; letter-spacing: 8px;
  }
  .invite {
    font-size: 12px; color: var(--muted);
    background: var(--surface); border-radius: var(--radius-sm);
    padding: 8px 14px; cursor: pointer;
  }
  .invite:hover { background: var(--surface-hover); color: var(--text); }
  .hostCfg { display: flex; align-items: center; gap: 12px; padding: 12px 16px; }
  .hostCfg input { width: 260px; }
  .teams { display: flex; gap: 14px; width: min(900px, 94vw); margin-top: 6px; }
  .col {
    flex: 1; background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 12px; min-height: 280px; display: flex; flex-direction: column; gap: 8px;
    transition: border-color 0.1s, background 0.1s;
  }
  .col h2 { font-size: 13px; letter-spacing: 2px; text-align: center; padding-bottom: 8px; border-bottom: 1px solid var(--border); font-weight: 600; }
  .col[data-team="red"] h2 { color: var(--red); }
  .col[data-team="blue"] h2 { color: var(--blue); }
  .col[data-team="spec"] h2 { color: var(--muted); }
  .col.dropOk { border-color: var(--green); background: rgba(55, 178, 108, 0.06); }
  .col .list { flex: 1; display: flex; flex-direction: column; gap: 6px; }
  .chip {
    background: var(--surface); border: 1px solid transparent; border-radius: var(--radius-sm);
    padding: 8px 10px; font-size: 14px; display: flex; align-items: center; gap: 8px;
  }
  .chip.draggable { cursor: grab; }
  .chip.dragging { opacity: 0.4; }
  .chip .dot { width: 10px; height: 10px; border-radius: 50%; background: #666; flex: none; }
  .chip[data-team="red"] .dot { background: var(--red); }
  .chip[data-team="blue"] .dot { background: var(--blue); }
  .chip .crown { margin-left: auto; font-size: 12px; }
  .chip.me { border-color: var(--border-strong); }
  .col > .btn { font-size: 12px; padding: 7px; }
  .lobbyFoot { display: flex; gap: 10px; align-items: center; margin-top: 10px; }
  .controlsHint { color: var(--muted); font-size: 12px; text-align: center; max-width: 660px; line-height: 1.8; margin-top: 8px; }
  kbd {
    background: #17171a; border: 1px solid var(--border-strong); border-bottom-width: 2px;
    border-radius: 4px; padding: 1px 6px; font-family: inherit; font-size: 11px; color: var(--text);
  }

  /* ---- Game ---- */
  #game { background: #0c1210; }
  #cv { position: absolute; inset: 0; width: 100%; height: 100%; }
  #banner {
    position: absolute; top: 18%; left: 0; right: 0; text-align: center;
    font-size: 56px; font-weight: 600; letter-spacing: 3px;
    text-shadow: 0 4px 24px rgba(0,0,0,0.7); pointer-events: none;
  }
  #endOverlay {
    position: absolute; inset: 0; background: rgba(10,10,12,0.82);
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px;
  }
  #endOverlay .big { font-size: 52px; font-weight: 600; }
  #endOverlay .sub { color: var(--muted); }
</style>
</head>
<body>

<!-- ===================== MENU ===================== -->
<div id="menu" class="view">
  <div class="title">AIM4<span class="io">.io</span> <span class="sub">FOOTBALL</span></div>
  <div class="conn" id="connStatus">connecting&hellip;</div>
  <div class="menuPanels">
    <section class="panel createPanel">
      <h2>CREATE LOBBY</h2>
      <label class="field">NAME<input id="nameInput" maxlength="16" placeholder="Your name" autocomplete="off"></label>
      <label class="field">PASSWORD<input id="passInput" maxlength="24" placeholder="optional" autocomplete="off"></label>
      <label class="check"><input type="checkbox" id="publicInput" checked> Show in public lobbies</label>
      <button id="createBtn" class="btn primary">Create lobby</button>
    </section>
    <section class="panel browsePanel">
      <h2>PUBLIC LOBBIES</h2>
      <div id="lobbyList" class="lobbyList"><div class="empty">&hellip;</div></div>
      <div class="joinRow">
        <input id="codeInput" maxlength="4" placeholder="CODE" autocomplete="off">
        <button id="joinBtn" class="btn">Join by code</button>
      </div>
    </section>
  </div>
  <div id="menuMsg" class="msg"></div>
  <a class="backLink" href="/">&larr; back to AIM4.io</a>
</div>

<!-- ===================== PASSWORD MODAL ===================== -->
<div id="passModal" class="modal hidden">
  <div class="panel modalPanel">
    <h2>PASSWORD REQUIRED</h2>
    <div class="msg" id="passMsg"></div>
    <input id="passJoinInput" type="password" maxlength="24" placeholder="Lobby password" autocomplete="off">
    <div class="row">
      <button id="passCancelBtn" class="btn">Cancel</button>
      <button id="passJoinBtn" class="btn primary">Join</button>
    </div>
  </div>
</div>

<!-- ===================== LOBBY ===================== -->
<div id="lobby" class="view hidden">
  <div class="lobbyHead">
    <div><span class="lobbyLabel">LOBBY</span><span class="code" id="codeLabel">----</span></div>
    <div class="invite" id="inviteLine" title="Click to copy the invite link">&hellip;</div>
  </div>
  <div class="panel hostCfg hidden" id="hostCfg">
    <label class="check"><input type="checkbox" id="cfgPublic"> Public</label>
    <input id="cfgPass" maxlength="24" placeholder="Set password (blank = none)" autocomplete="off">
    <button id="cfgApply" class="btn">Apply password</button>
  </div>
  <div class="teams">
    <div class="col" data-team="red">
      <h2>RED</h2>
      <div class="list"></div>
      <button class="btn" data-selfjoin="red">Join red</button>
    </div>
    <div class="col" data-team="spec">
      <h2>SPECTATORS</h2>
      <div class="list"></div>
      <button class="btn" data-selfjoin="spec">Spectate</button>
    </div>
    <div class="col" data-team="blue">
      <h2>BLUE</h2>
      <div class="list"></div>
      <button class="btn" data-selfjoin="blue">Join blue</button>
    </div>
  </div>
  <div class="lobbyFoot">
    <button id="startBtn" class="btn primary">Start match</button>
    <button id="leaveBtn" class="btn danger">Leave</button>
  </div>
  <div id="lobbyMsg" class="msg"></div>
</div>

<!-- ===================== GAME ===================== -->
<div id="game" class="view hidden">
  <canvas id="cv"></canvas>
  <div id="banner" class="hidden"></div>
  <div id="endOverlay" class="hidden">
    <div class="big" id="endScore"></div>
    <div class="sub" id="endSub"></div>
  </div>
</div>

<script type="module">
  // ---- Constants mirrored from server/football.js (keep in sync) ----------
  const FIELD_W = 72;
  const FIELD_H = 45;
  const PLAYER_R = 1.232;
  const BALL_R = 1.2;
  const BASE_SPEED = 11.55;
  const SPRINT_SPEED = 20.735;
  const MOVE_ACCEL = 12;
  const STAMINA_MAX = 8;
  const STAMINA_REGEN = 0.8;
  const WINDED_RECOVER = 1.6;
  const SHOOT_STAMINA_MAX = 80;
  const SHOOT_STAMINA_REGEN = 18;
  const BALL_FRICTION = 0.72;
  const KICK_POWER_SCALE = 0.775;
  const KICK_MIN = 3.5, KICK_MAX = 46;
  const KICK_RANGE = PLAYER_R + BALL_R + 2.0;
  const KICK_COOLDOWN_MS = 420;
  const SHOOT_MIN_TO_FIRE = 10;
  const CHARGE_TIME = 0.9;
  const CHARGE_SLOW_MAX = 0.55;
  const CHARGE_POWER_BONUS = 0.35;
  const CHARGE_BASE_POWER = 44;
  const POST_R = 0.7;
  const CORNER_R = 0.55;
  // Remote players / ball: render slightly behind latest snap for smoothness.
  // Local player uses client-side prediction (no delay).
  const REMOTE_INTERP_MS = 50;

  const TEAM_COLOR = { red: '#ff5544', blue: '#4da3ff' };

  // ---- DOM ------------------------------------------------------------------
  const $ = (id) => document.getElementById(id);
  const views = { menu: $('menu'), lobby: $('lobby'), game: $('game') };
  const nameInput = $('nameInput');
  const passInput = $('passInput');
  const publicInput = $('publicInput');
  const codeInput = $('codeInput');
  const connStatus = $('connStatus');
  const menuMsg = $('menuMsg');
  const lobbyMsg = $('lobbyMsg');
  const codeLabel = $('codeLabel');
  const inviteLine = $('inviteLine');
  const startBtn = $('startBtn');
  const hostCfg = $('hostCfg');
  const cfgPublic = $('cfgPublic');
  const cfgPass = $('cfgPass');
  const lobbyListEl = $('lobbyList');
  const passModal = $('passModal');
  const passMsg = $('passMsg');
  const passJoinInput = $('passJoinInput');
  const banner = $('banner');
  const endOverlay = $('endOverlay');
  const cv = $('cv');
  const ctx = cv.getContext('2d');

  nameInput.value = localStorage.getItem('aim4-football-name') || '';

  function show(name) {
    for (const k in views) views[k].classList.toggle('hidden', k !== name);
    if (name === 'menu' && ws && ws.readyState === 1) send({ t: 'list' });
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, (c) => (
      { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]
    ));
  }

  // ---- Server resolution (same precedence as the main client's NetClient):
  // ?server= override → VITE_API_URL (baked at build, the hosted backend) →
  // same origin (LAN/host mode, or Vite's dev proxy).
  function resolveApiUrl() {
    const raw = import.meta.env.VITE_API_URL;
    if (!raw) return null;
    return raw.startsWith('http') ? raw : `https://${raw}`;
  }
  function wsUrl() {
    const q = new URLSearchParams(location.search).get('server');
    if (q) {
      const host = q.replace(/^https?:\/\//, '').replace(/\/$/, '');
      const proto = location.protocol === 'https:' ? 'wss' : 'ws';
      return `${proto}://${host}/football`;
    }
    const api = resolveApiUrl();
    if (api) {
      try {
        const u = new URL(api);
        return `${u.protocol === 'https:' ? 'wss' : 'ws'}://${u.host}/football`;
      } catch { /* fall through */ }
    }
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    return `${proto}://${location.host}/football`;
  }

  // ---- URL ↔ lobby (invite links use ?lobby=CODE like the main game) --------
  function setLobbyParam(code) {
    const url = new URL(location.href);
    if (code) url.searchParams.set('lobby', code);
    else url.searchParams.delete('lobby');
    url.searchParams.delete('join'); // legacy param
    history.replaceState(null, '', url);
    document.title = code ? `AIM4 Football — ${code}` : 'AIM4 Football';
  }
  function inviteUrl(code) {
    return `${location.origin}${location.pathname}?lobby=${code}`;
  }
  const bootParams = new URLSearchParams(location.search);
  let autoJoinCode = (bootParams.get('lobby') || bootParams.get('join') || '')
    .toUpperCase().slice(0, 4);

  // ---- Networking -------------------------------------------------------------
  let ws = null;
  let myId = null;
  let lobby = null;
  let roster = new Map();
  let field = { w: 72, h: 45, gt: 15.3, gb: 29.7, gd: 2.5 };
  let goalsToWin = 5;
  let snaps = [];
  let lastKicks = [];
  let ballTrail = [];
  let inGame = false;
  let pred = null; // local client prediction { x, y, vx, vy, stamina, shoot, winded, sprinting }
  let lastFrameT = 0;
  let pendingJoin = null; // { code } while the password modal is open

  function connect() {
    connStatus.textContent = 'connecting…';
    connStatus.classList.remove('bad');
    ws = new WebSocket(wsUrl());
    ws.onopen = () => {
      connStatus.textContent = '';
      send({ t: 'list' });
      if (autoJoinCode) {
        if (myName(false)) {
          joinLobby(autoJoinCode);
        } else {
          codeInput.value = autoJoinCode;
          menuMsg.textContent = `Enter your name, then join ${autoJoinCode}`;
          nameInput.focus();
        }
        autoJoinCode = '';
      }
    };
    ws.onclose = () => {
      ws = null;
      myId = null;
      lobby = null;
      inGame = false;
      setLobbyParam(null);
      show('menu');
      renderLobbyList(null);
      connStatus.textContent = 'server offline — retrying…';
      connStatus.classList.add('bad');
      setTimeout(connect, 3000);
    };
    ws.onmessage = (ev) => {
      let msg;
      try { msg = JSON.parse(ev.data); } catch { return; }
      handle(msg);
    };
  }

  function send(obj) {
    if (ws && ws.readyState === 1) ws.send(JSON.stringify(obj));
  }

  function handle(msg) {
    switch (msg.t) {
      case 'welcome':
        myId = msg.id;
        break;
      case 'error':
        if (msg.code === 'pass') {
          pendingJoin = { code: msg.joinCode };
          passMsg.textContent = msg.msg === 'Wrong password' ? 'Wrong password — try again' : '';
          passModal.classList.remove('hidden');
          passJoinInput.value = '';
          passJoinInput.focus();
        } else {
          (views.menu.classList.contains('hidden') ? lobbyMsg : menuMsg).textContent = msg.msg;
        }
        break;
      case 'lobbyList':
        renderLobbyList(msg.lobbies);
        break;
      case 'lobby':
        lobby = msg;
        roster = new Map(msg.players.map((p) => [p.id, p]));
        setLobbyParam(msg.code);
        if (!inGame) { show('lobby'); renderLobby(); }
        break;
      case 'start':
        field = msg.field;
        goalsToWin = msg.goalsToWin;
        roster = new Map(msg.players.map((p) => [p.id, p]));
        snaps = [];
        ballTrail = [];
        lastKicks = [];
        pred = null;
        lastFrameT = 0;
        inGame = true;
        endOverlay.classList.add('hidden');
        banner.classList.add('hidden');
        show('game');
        resize();
        break;
      case 'state':
        snaps.push({ rt: performance.now(), s: msg });
        if (snaps.length > 20) snaps.shift();
        reconcilePred(msg);
        break;
      case 'kick':
        lastKicks.push({ x: msg.x, y: msg.y, p: msg.p, rt: performance.now() });
        if (pred && msg.id === myId) {
          pred.kickReadyAt = performance.now() + KICK_COOLDOWN_MS;
          pred.cd = 0;
          pred.charge = 0;
        }
        break;
      case 'goal': {
        const who = msg.byName ? (msg.og ? `${msg.byName} (own goal!)` : msg.byName) : '';
        banner.innerHTML =
          `<span style="color:${TEAM_COLOR[msg.team]}">GOAL!</span>` +
          (who ? `<div style="font-size:22px;font-weight:500;margin-top:6px">${escapeHtml(who)}</div>` : '');
        banner.classList.remove('hidden');
        setTimeout(() => banner.classList.add('hidden'), 2000);
        break;
      }
      case 'end': {
        inGame = false;
        pred = null;
        lastFrameT = 0;
        const w = msg.winner;
        $('endScore').innerHTML =
          `<span style="color:${TEAM_COLOR.red}">${msg.score.red}</span>` +
          ` &mdash; ` +
          `<span style="color:${TEAM_COLOR.blue}">${msg.score.blue}</span>`;
        $('endSub').textContent = msg.aborted
          ? 'Match stopped by host — returning to lobby…'
          : w ? `${w.toUpperCase()} wins! Returning to lobby…` : 'Returning to lobby…';
        endOverlay.classList.remove('hidden');
        setTimeout(() => {
          endOverlay.classList.add('hidden');
          if (lobby) { show('lobby'); renderLobby(); }
        }, 3000);
        break;
      }
    }
  }

  // ---- Menu actions -------------------------------------------------------------
  function myName(required = true) {
    const n = nameInput.value.trim().slice(0, 16);
    if (n) localStorage.setItem('aim4-football-name', n);
    else if (required) {
      menuMsg.textContent = 'Enter a name first';
      nameInput.focus();
    }
    return n;
  }

  function joinLobby(code, pass) {
    const name = myName();
    if (!name) return;
    menuMsg.textContent = '';
    send({ t: 'join', code, name, pass });
  }

  $('createBtn').onclick = () => {
    const name = myName();
    if (!name) return;
    menuMsg.textContent = '';
    send({ t: 'create', name, pass: passInput.value, isPublic: publicInput.checked });
  };
  $('joinBtn').onclick = () => {
    const code = codeInput.value.trim().toUpperCase();
    if (code.length !== 4) { menuMsg.textContent = 'Enter a 4-letter code'; return; }
    joinLobby(code);
  };
  codeInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') $('joinBtn').click(); });

  // Password modal.
  $('passJoinBtn').onclick = () => {
    if (!pendingJoin) return;
    joinLobby(pendingJoin.code, passJoinInput.value);
    passModal.classList.add('hidden');
  };
  $('passCancelBtn').onclick = () => {
    pendingJoin = null;
    passModal.classList.add('hidden');
  };
  passJoinInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') $('passJoinBtn').click(); });

  function renderLobbyList(lobbies) {
    if (lobbies === null) {
      lobbyListEl.innerHTML = '<div class="empty">&hellip;</div>';
      return;
    }
    if (!lobbies.length) {
      lobbyListEl.innerHTML = '<div class="empty">No public lobbies right now — create one!</div>';
      return;
    }
    lobbyListEl.innerHTML = lobbies
      .map((l) => `<div class="lobbyItem">
        <div class="info">
          <span class="host">${escapeHtml(l.host)}${l.locked ? ' &#128274;' : ''}</span>
          <span class="meta">${l.players}/${l.max} players &middot; ${l.inMatch ? 'match in progress' : 'in lobby'}</span>
        </div>
        <button class="btn primary" data-join-code="${l.code}">Join</button>
      </div>`)
      .join('');
    lobbyListEl.querySelectorAll('[data-join-code]').forEach((b) => {
      b.onclick = () => joinLobby(b.dataset.joinCode);
    });
  }

  // ---- Lobby --------------------------------------------------------------------
  const isHost = () => lobby && lobby.hostId === myId;

  inviteLine.onclick = () => {
    if (!lobby) return;
    const url = inviteUrl(lobby.code);
    navigator.clipboard?.writeText(url).then(
      () => {
        inviteLine.textContent = 'invite link copied!';
        setTimeout(() => { if (lobby) inviteLine.textContent = inviteUrl(lobby.code); }, 1600);
      },
      () => {}
    );
  };

  $('leaveBtn').onclick = () => {
    send({ t: 'leave' });
    lobby = null;
    setLobbyParam(null);
    show('menu');
  };
  startBtn.onclick = () => send({ t: 'start' });
  document.querySelectorAll('[data-selfjoin]').forEach((b) => {
    b.onclick = () => send({ t: 'team', team: b.dataset.selfjoin });
  });

  // Host lobby settings: checkbox applies instantly; password via Apply.
  cfgPublic.onchange = () => { if (isHost()) send({ t: 'config', isPublic: cfgPublic.checked }); };
  $('cfgApply').onclick = () => {
    if (!isHost()) return;
    send({ t: 'config', pass: cfgPass.value });
    cfgPass.value = '';
    cfgPass.placeholder = 'saved';
    setTimeout(() => syncCfgPlaceholder(), 1200);
  };
  function syncCfgPlaceholder() {
    if (!lobby) return;
    cfgPass.placeholder = lobby.hasPass
      ? 'password set — type to replace, apply blank to remove'
      : 'Set password (blank = none)';
  }

  function renderLobby() {
    if (!lobby) return;
    codeLabel.textContent = lobby.code;
    inviteLine.textContent = inviteUrl(lobby.code);
    lobbyMsg.textContent = '';
    startBtn.classList.toggle('hidden', !isHost());
    hostCfg.classList.toggle('hidden', !isHost());
    if (isHost()) {
      cfgPublic.checked = lobby.isPublic !== false;
      syncCfgPlaceholder();
    }
    document.querySelectorAll('.col').forEach((col) => {
      const list = col.querySelector('.list');
      list.innerHTML = '';
      for (const p of lobby.players) {
        if (p.team !== col.dataset.team) continue;
        const chip = document.createElement('div');
        chip.className = 'chip';
        chip.dataset.team = p.team;
        if (p.id === myId) chip.classList.add('me');
        const canDrag = isHost() || p.id === myId;
        if (canDrag) {
          chip.classList.add('draggable');
          chip.draggable = true;
          chip.addEventListener('dragstart', (e) => {
            e.dataTransfer.setData('text/plain', String(p.id));
            e.dataTransfer.effectAllowed = 'move';
            chip.classList.add('dragging');
          });
          chip.addEventListener('dragend', () => chip.classList.remove('dragging'));
        }
        chip.innerHTML =
          `<span class="dot"></span>${escapeHtml(p.name)}${p.id === myId ? ' (you)' : ''}` +
          (p.id === lobby.hostId ? '<span class="crown" title="Host">&#128081;</span>' : '');
        list.appendChild(chip);
      }
    });
  }

  document.querySelectorAll('.col').forEach((col) => {
    col.addEventListener('dragover', (e) => { e.preventDefault(); col.classList.add('dropOk'); });
    col.addEventListener('dragleave', () => col.classList.remove('dropOk'));
    col.addEventListener('drop', (e) => {
      e.preventDefault();
      col.classList.remove('dropOk');
      const id = Number(e.dataTransfer.getData('text/plain'));
      if (!id) return;
      const team = col.dataset.team;
      if (id === myId && !isHost()) send({ t: 'team', team });
      else if (isHost()) send({ t: 'setTeam', id, team });
    });
  });

  // ---- Game input -----------------------------------------------------------------
  const keys = { u: false, d: false, l: false, r: false, sp: false, k: false, st: false };
  let mouse = { x: 0, y: 0 };
  let mouseKick = false;
  let mouseStop = false;

  const KEYMAP = {
    KeyW: 'u', ArrowUp: 'u',
    KeyS: 'd', ArrowDown: 'd',
    KeyA: 'l', ArrowLeft: 'l',
    KeyD: 'r', ArrowRight: 'r',
    Space: 'k',
    KeyF: 'st',
    ShiftLeft: 'sp', ShiftRight: 'sp'
  };
  function kickHeld() {
    return keys.k || mouseKick;
  }
  function stopHeld() {
    return keys.st || mouseStop;
  }
  function sendInput() {
    if (!inGame || !ws || ws.readyState !== 1) return;
    const aim = screenToField(mouse.x, mouse.y);
    send({
      t: 'input',
      u: keys.u, d: keys.d, l: keys.l, r: keys.r,
      sp: keys.sp, k: kickHeld(), st: stopHeld(),
      ax: aim.x, ay: aim.y
    });
  }

  window.addEventListener('keydown', (e) => {
    const k = KEYMAP[e.code];
    if (!k || !inGame) return;
    if (!keys[k]) {
      keys[k] = true;
      sendInput();
    }
    e.preventDefault();
  });
  window.addEventListener('keyup', (e) => {
    const k = KEYMAP[e.code];
    if (!k) return;
    if (keys[k]) {
      keys[k] = false;
      sendInput();
    }
  });
  window.addEventListener('blur', () => {
    for (const k in keys) keys[k] = false;
    mouseKick = false;
    mouseStop = false;
    sendInput();
  });
  window.addEventListener('mousemove', (e) => { mouse.x = e.clientX; mouse.y = e.clientY; });
  window.addEventListener('mousedown', (e) => {
    if (!inGame) return;
    mouse.x = e.clientX;
    mouse.y = e.clientY;
    if (e.button === 0) {
      if (!mouseKick) {
        mouseKick = true;
        sendInput();
      }
      e.preventDefault();
    } else if (e.button === 2) {
      if (!mouseStop) {
        mouseStop = true;
        sendInput();
      }
      e.preventDefault();
    }
  });
  window.addEventListener('mouseup', (e) => {
    if (e.button === 0 && mouseKick) {
      mouseKick = false;
      sendInput();
    } else if (e.button === 2 && mouseStop) {
      mouseStop = false;
      sendInput();
    }
  });
  window.addEventListener('contextmenu', (e) => {
    if (inGame) e.preventDefault();
  }, true);
  // Release charge if the pointer leaves the window while held.
  window.addEventListener('mouseleave', () => {
    let changed = false;
    if (mouseKick) { mouseKick = false; changed = true; }
    if (mouseStop) { mouseStop = false; changed = true; }
    if (changed) sendInput();
  });

  setInterval(sendInput, 16);

  // ---- View transform ----------------------------------------------------------
  let sc = 1, ox = 0, oy = 0;

  function resize() {
    const dpr = window.devicePixelRatio || 1;
    cv.width = Math.floor(innerWidth * dpr);
    cv.height = Math.floor(innerHeight * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    // Keep the pitch small on screen so cursor can travel far off-field for power.
    const margin = 0.2;
    const usableW = innerWidth * (1 - margin * 2);
    const usableH = innerHeight * (1 - margin * 2);
    sc = Math.min(
      usableW / (field.w + field.gd * 2),
      usableH / field.h
    );
    ox = (innerWidth - field.w * sc) / 2;
    oy = (innerHeight - field.h * sc) / 2;
  }
  window.addEventListener('resize', resize);

  const px = (x) => ox + x * sc;
  const py = (y) => oy + y * sc;
  function screenToField(mx, my) {
    return { x: (mx - ox) / sc, y: (my - oy) / sc };
  }

  // ---- Local prediction (instant WASD) + remote interpolation ----------------
  // Lag came from drawing the local player from delayed server snapshots.
  // We simulate our own avatar every frame with the same movement constants;
  // remote players + ball still interpolate/extrapolate from the server stream.

  function clamp(v, a, b) {
    return v < a ? a : v > b ? b : v;
  }

  function resetPred(sx, sy, stamina, winded, sprinting, shoot, cd, ch) {
    pred = {
      x: sx,
      y: sy,
      vx: 0,
      vy: 0,
      stamina: stamina ?? STAMINA_MAX,
      shoot: shoot ?? SHOOT_STAMINA_MAX,
      winded: !!winded,
      sprinting: !!sprinting,
      charge: ch ?? 0,
      cd: cd ?? 1,
      kickReadyAt: 0,
      prevK: false
    };
  }

  function reconcilePred(msg) {
    if (!myId || msg.ph !== 'play') {
      if (msg.ph !== 'play') pred = null;
      return;
    }
    const me = msg.pl.find((p) => p.i === myId);
    if (!me) {
      pred = null;
      return;
    }
    if (!pred) {
      resetPred(me.x, me.y, me.s, me.w, me.r, me.ss, me.cd, me.ch);
      return;
    }
    const err = Math.hypot(pred.x - me.x, pred.y - me.y);
    if (err > 4) {
      resetPred(me.x, me.y, me.s, me.w, me.r, me.ss, me.cd, me.ch);
      return;
    }
    // Soft correction — keep predicted motion responsive without rubber-banding.
    const k = err > 1.2 ? 0.35 : 0.12;
    pred.x += (me.x - pred.x) * k;
    pred.y += (me.y - pred.y) * k;
    pred.stamina = me.s;
    pred.shoot = me.ss ?? pred.shoot;
    pred.winded = !!me.w;
    pred.sprinting = !!me.r;
    if (typeof me.cd === 'number') {
      // Keep local cooldown animation until it finishes; then trust the server.
      if (!pred.kickReadyAt || performance.now() >= pred.kickReadyAt) {
        pred.cd = me.cd;
        pred.kickReadyAt = 0;
      }
    }
    // Prefer local charge while holding for snappy ring feedback.
    if (!kickHeld() && typeof me.ch === 'number') pred.charge = me.ch;
  }

  function stepPred(dt) {
    if (!pred || !inGame || dt <= 0) return;
    let wx = (keys.r ? 1 : 0) - (keys.l ? 1 : 0);
    let wy = (keys.d ? 1 : 0) - (keys.u ? 1 : 0);
    const len = Math.hypot(wx, wy);
    if (len > 0) {
      wx /= len;
      wy /= len;
    }
    const wantsSprint = keys.sp && len > 0;
    const sprinting = wantsSprint && !pred.winded && pred.stamina > 0;
    if (sprinting) {
      pred.stamina = Math.max(0, pred.stamina - dt);
      if (pred.stamina <= 0) pred.winded = true;
    } else {
      pred.stamina = Math.min(STAMINA_MAX, pred.stamina + STAMINA_REGEN * dt);
      if (pred.winded && pred.stamina >= WINDED_RECOVER) pred.winded = false;
    }
    pred.shoot = Math.min(SHOOT_STAMINA_MAX, pred.shoot + SHOOT_STAMINA_REGEN * dt);

    const now = performance.now();
    if (pred.kickReadyAt && now < pred.kickReadyAt) {
      pred.cd = 1 - (pred.kickReadyAt - now) / KICK_COOLDOWN_MS;
    } else if (pred.kickReadyAt && now >= pred.kickReadyAt) {
      pred.cd = 1;
      pred.kickReadyAt = 0;
    }

    const kDown = kickHeld();
    const canCharge = kDown && (pred.cd ?? 1) >= 0.99 && pred.shoot >= SHOOT_MIN_TO_FIRE;
    if (canCharge) {
      pred.charge = Math.min(1, (pred.charge || 0) + dt / CHARGE_TIME);
    } else if (kDown) {
      pred.charge = 0;
    }
    if (pred.prevK && !kDown) {
      pred.charge = 0;
    }
    pred.prevK = kDown;

    let speed = sprinting ? SPRINT_SPEED : BASE_SPEED;
    if (kDown && (pred.charge || 0) > 0) {
      speed *= 1 - pred.charge * CHARGE_SLOW_MAX;
    }
    const k = Math.min(1, MOVE_ACCEL * dt);
    pred.vx += (wx * speed - pred.vx) * k;
    pred.vy += (wy * speed - pred.vy) * k;
    pred.x = clamp(pred.x + pred.vx * dt, PLAYER_R, FIELD_W - PLAYER_R);
    pred.y = clamp(pred.y + pred.vy * dt, PLAYER_R, FIELD_H - PLAYER_R);
    pred.sprinting = sprinting;
  }

  function sampleState(now) {
    if (!snaps.length) return null;
    const rt = now - REMOTE_INTERP_MS;
    let a = snaps[0], b = snaps[0];
    for (let i = 0; i < snaps.length; i++) {
      if (snaps[i].rt <= rt) a = snaps[i];
      if (snaps[i].rt >= rt) { b = snaps[i]; break; }
      b = snaps[i];
    }
    const span = b.rt - a.rt;
    const f = span > 0 ? Math.min(1, Math.max(0, (rt - a.rt) / span)) : 1;
    const lerp = (u, v) => u + (v - u) * f;

    const players = new Map();
    for (const q of b.s.pl) players.set(q.i, { ...q });
    for (const q of a.s.pl) {
      const cur = players.get(q.i);
      if (cur) {
        // Local player is overwritten by prediction during play; still lerp
        // for kickoff/goal freezes when prediction is off.
        cur.x = lerp(q.x, cur.x);
        cur.y = lerp(q.y, cur.y);
      }
    }

    // Ball: interpolate between snaps, then extrapolate a hair with velocity.
    const bx = lerp(a.s.ball.x, b.s.ball.x);
    const by = lerp(a.s.ball.y, b.s.ball.y);
    const bvx = lerp(a.s.ball.vx ?? 0, b.s.ball.vx ?? 0);
    const bvy = lerp(a.s.ball.vy ?? 0, b.s.ball.vy ?? 0);
    const ahead = Math.max(0, Math.min(0.05, (now - b.rt) / 1000));

    return {
      ph: b.s.ph,
      kt: b.s.kt,
      sc: b.s.sc,
      ball: { x: bx + bvx * ahead, y: by + bvy * ahead },
      players
    };
  }

  // ---- Rendering ------------------------------------------------------------------
  /** Radial shoot-ready / charge ring drawn inside the player disc. */
  function drawShootRing(q, isLocal) {
    const ready = Math.max(0, Math.min(1, q.cd ?? 1));
    const charge = Math.max(0, Math.min(1, q.ch ?? 0));
    const cx = px(q.x);
    const cy = py(q.y);
    const r = PLAYER_R * sc * 0.62;
    const lw = isLocal ? 3 : 2.25;
    const start = -Math.PI / 2;

    // Dim full track
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(0,0,0,0.4)';
    ctx.lineWidth = lw + 1;
    ctx.stroke();

    // Ready sweep: cool slate → mint as it fills after a shot
    if (ready > 0.005) {
      const t = ready;
      const rr = Math.round(70 + (90 - 70) * t);
      const gg = Math.round(90 + (230 - 90) * t);
      const bb = Math.round(110 + (160 - 110) * t);
      const a = 0.45 + 0.5 * t;
      ctx.beginPath();
      ctx.arc(cx, cy, r, start, start + Math.PI * 2 * t);
      ctx.strokeStyle = `rgba(${rr},${gg},${bb},${a})`;
      ctx.lineWidth = lw;
      ctx.lineCap = 'round';
      ctx.stroke();
      ctx.lineCap = 'butt';
    }

    // Charge overlay: amber arc grows while holding Space / LMB
    if (charge > 0.02) {
      ctx.beginPath();
      ctx.arc(cx, cy, r, start, start + Math.PI * 2 * charge);
      const a = 0.6 + 0.35 * charge;
      ctx.strokeStyle = `rgba(255,${Math.round(200 - charge * 80)},60,${a})`;
      ctx.lineWidth = lw + (isLocal ? 0.5 : 0);
      ctx.lineCap = 'round';
      ctx.stroke();
      ctx.lineCap = 'butt';
    }
  }

  function draw() {
    requestAnimationFrame(draw);
    if (!inGame) return;
    const now = performance.now();
    const dt = lastFrameT ? Math.min(0.05, (now - lastFrameT) / 1000) : 0.016;
    lastFrameT = now;
    if (pred) stepPred(dt);

    const st = sampleState(now);
    ctx.clearRect(0, 0, innerWidth, innerHeight);
    drawPitch();
    if (!st) return;

    // Overlay predicted local player into the render set.
    const serverMe = st.players.get(myId);
    const me = pred && st.ph === 'play'
      ? {
          i: myId,
          x: pred.x,
          y: pred.y,
          s: pred.stamina,
          ss: pred.shoot,
          r: pred.sprinting ? 1 : 0,
          w: pred.winded ? 1 : 0,
          cd: pred.cd ?? serverMe?.cd ?? 1,
          ch: pred.charge ?? 0
        }
      : serverMe || null;
    if (me) st.players.set(myId, me);

    ballTrail.push({ x: st.ball.x, y: st.ball.y });
    if (ballTrail.length > 12) ballTrail.shift();

    lastKicks = lastKicks.filter((k) => now - k.rt < 300);
    for (const k of lastKicks) {
      const f = 1 - (now - k.rt) / 300;
      ctx.beginPath();
      ctx.arc(px(k.x), py(k.y), (BALL_R + 2.5 * (1 - f)) * sc, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(255,255,255,${0.5 * f})`;
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    for (const [id, q] of st.players) {
      const info = roster.get(id);
      const color = TEAM_COLOR[info?.team] || '#888';
      ctx.beginPath();
      ctx.ellipse(px(q.x), py(q.y) + PLAYER_R * sc * 0.45, PLAYER_R * sc * 0.95, PLAYER_R * sc * 0.5, 0, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(0,0,0,0.25)';
      ctx.fill();
      ctx.beginPath();
      ctx.arc(px(q.x), py(q.y), PLAYER_R * sc, 0, Math.PI * 2);
      ctx.fillStyle = color;
      ctx.fill();
      drawShootRing(q, id === myId);
      ctx.beginPath();
      ctx.arc(px(q.x), py(q.y), PLAYER_R * sc, 0, Math.PI * 2);
      ctx.lineWidth = id === myId ? 3 : 1.5;
      ctx.strokeStyle = id === myId ? '#ffffff' : 'rgba(0,0,0,0.35)';
      ctx.stroke();
      if (q.r) {
        ctx.beginPath();
        ctx.arc(px(q.x), py(q.y), (PLAYER_R + 0.45) * sc, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(255,255,255,0.35)';
        ctx.lineWidth = 1.5;
        ctx.stroke();
      }
      ctx.font = `500 ${Math.max(11, sc * 1.1)}px Host Grotesk, Segoe UI, sans-serif`;
      ctx.textAlign = 'center';
      ctx.fillStyle = id === myId ? '#fff' : 'rgba(255,255,255,0.8)';
      ctx.fillText(info?.name || '?', px(q.x), py(q.y) - (PLAYER_R + 1.1) * sc);
    }

    if (me) {
      const aim = screenToField(mouse.x, mouse.y);
      const dirX = aim.x - st.ball.x;
      const dirY = aim.y - st.ball.y;
      const aimDist = Math.hypot(aim.x - me.x, aim.y - me.y);
      const charge = me.ch || 0;
      const chargeFloor = charge * charge * CHARGE_BASE_POWER;
      const chargeMul = 1 + charge * CHARGE_POWER_BONUS;
      const powerCap = KICK_MAX * (1 + CHARGE_POWER_BONUS) + CHARGE_BASE_POWER * 0.15;
      const raw = (aimDist * KICK_POWER_SCALE + chargeFloor) * chargeMul;
      const power = Math.min(1, Math.max(0, (raw - KICK_MIN) / (powerCap - KICK_MIN)));
      const inReach = Math.hypot(st.ball.x - me.x, st.ball.y - me.y) <= KICK_RANGE;
      ctx.setLineDash([6, 6]);
      ctx.beginPath();
      ctx.moveTo(px(me.x), py(me.y));
      ctx.lineTo(px(aim.x), py(aim.y));
      ctx.strokeStyle = inReach ? `rgba(255,${Math.round(230 - power * 170)},80,0.55)` : 'rgba(255,255,255,0.18)';
      ctx.lineWidth = 1.5 + charge * 1.5;
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.beginPath();
      ctx.arc(px(aim.x), py(aim.y), 5 + power * 4, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(255,255,255,0.5)';
      ctx.stroke();
      if (inReach && Math.hypot(dirX, dirY) > 0.5) {
        const n = Math.hypot(dirX, dirY);
        ctx.beginPath();
        ctx.moveTo(px(st.ball.x), py(st.ball.y));
        ctx.lineTo(px(st.ball.x + (dirX / n) * 4), py(st.ball.y + (dirY / n) * 4));
        ctx.strokeStyle = `rgba(255,${Math.round(230 - power * 170)},80,0.35)`;
        ctx.lineWidth = 2;
        ctx.stroke();
      }
    }

    for (let i = 0; i < ballTrail.length - 1; i++) {
      const t = ballTrail[i];
      ctx.beginPath();
      ctx.arc(px(t.x), py(t.y), BALL_R * sc * (0.3 + 0.5 * (i / ballTrail.length)), 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${0.05 + 0.05 * i})`;
      ctx.fill();
    }
    ctx.beginPath();
    ctx.ellipse(px(st.ball.x), py(st.ball.y) + BALL_R * sc * 0.5, BALL_R * sc * 0.9, BALL_R * sc * 0.45, 0, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(px(st.ball.x), py(st.ball.y), BALL_R * sc, 0, Math.PI * 2);
    ctx.fillStyle = '#f5f5f5';
    ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.4)';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    drawHud(st, me);
  }

  function drawPitch() {
    const w = field.w, h = field.h;
    ctx.fillStyle = '#17351f';
    ctx.fillRect(px(-field.gd) - 6, py(0) - 6, (w + field.gd * 2) * sc + 12, h * sc + 12);
    for (let i = 0; i < 10; i++) {
      if (i % 2) continue;
      ctx.fillStyle = 'rgba(255,255,255,0.03)';
      ctx.fillRect(px((w / 10) * i), py(0), (w / 10) * sc, h * sc);
    }
    ctx.strokeStyle = 'rgba(255,255,255,0.75)';
    ctx.lineWidth = 2;
    ctx.strokeRect(px(0), py(0), w * sc, h * sc);
    ctx.beginPath();
    ctx.moveTo(px(w / 2), py(0));
    ctx.lineTo(px(w / 2), py(h));
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(px(w / 2), py(h / 2), Math.min(9, field.w * 0.12) * sc, 0, Math.PI * 2);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(px(w / 2), py(h / 2), 2.5, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.75)';
    ctx.fill();
    const boxH = field.h * 0.48, boxW = field.w * 0.14;
    ctx.strokeRect(px(0), py((h - boxH) / 2), boxW * sc, boxH * sc);
    ctx.strokeRect(px(w - boxW), py((h - boxH) / 2), boxW * sc, boxH * sc);
    for (const side of [0, 1]) {
      const gx = side === 0 ? -field.gd : w;
      ctx.fillStyle = 'rgba(255,255,255,0.06)';
      ctx.fillRect(px(gx), py(field.gt), field.gd * sc, (field.gb - field.gt) * sc);
      ctx.strokeStyle = side === 0 ? TEAM_COLOR.red : TEAM_COLOR.blue;
      ctx.lineWidth = 3;
      ctx.strokeRect(px(gx), py(field.gt), field.gd * sc, (field.gb - field.gt) * sc);
      ctx.strokeStyle = 'rgba(255,255,255,0.12)';
      ctx.lineWidth = 1;
      for (let yy = field.gt + 2; yy < field.gb; yy += 2) {
        ctx.beginPath();
        ctx.moveTo(px(gx), py(yy));
        ctx.lineTo(px(gx + field.gd), py(yy));
        ctx.stroke();
      }
      // Goal posts as pillars
      const postX = side === 0 ? 0 : w;
      for (const yy of [field.gt, field.gb]) {
        ctx.beginPath();
        ctx.arc(px(postX), py(yy), POST_R * sc, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(220,220,230,0.92)';
        ctx.fill();
        ctx.strokeStyle = 'rgba(0,0,0,0.35)';
        ctx.lineWidth = 1.5;
        ctx.stroke();
      }
    }
    // Field corner pillars
    for (const [cx, cy] of [[0, 0], [w, 0], [0, h], [w, h]]) {
      ctx.beginPath();
      ctx.arc(px(cx), py(cy), CORNER_R * sc, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(200,200,210,0.75)';
      ctx.fill();
      ctx.strokeStyle = 'rgba(0,0,0,0.3)';
      ctx.lineWidth = 1.25;
      ctx.stroke();
    }
  }

  function drawHud(st, me) {
    ctx.textAlign = 'center';
    ctx.font = '600 26px Host Grotesk, Segoe UI, sans-serif';
    ctx.fillStyle = TEAM_COLOR.red;
    ctx.fillText(String(st.sc.red), innerWidth / 2 - 44, 34);
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.fillText('–', innerWidth / 2, 34);
    ctx.fillStyle = TEAM_COLOR.blue;
    ctx.fillText(String(st.sc.blue), innerWidth / 2 + 44, 34);

    if (st.ph === 'kickoff') {
      ctx.font = '600 40px Host Grotesk, Segoe UI, sans-serif';
      ctx.fillStyle = 'rgba(255,255,255,0.9)';
      ctx.fillText(st.kt > 500 ? String(Math.ceil(st.kt / 1000)) : 'GO!', innerWidth / 2, innerHeight / 2 - 60);
    }

    if (me) {
      const bw = 220, bh = 8, gap = 6;
      const bx = (innerWidth - bw) / 2;
      const bySprint = innerHeight - 36;
      const byShoot = bySprint + bh + gap;

      // Sprint stamina (green)
      ctx.fillStyle = 'rgba(0,0,0,0.45)';
      ctx.fillRect(bx - 2, bySprint - 2, bw + 4, bh + 4);
      const sf = Math.max(0, Math.min(1, me.s / STAMINA_MAX));
      ctx.fillStyle = me.w ? '#e6a23c' : (keys.sp ? '#6fe3a1' : '#37b26c');
      ctx.fillRect(bx, bySprint, bw * sf, bh);

      // Shoot stamina (amber)
      const shoot = me.ss ?? SHOOT_STAMINA_MAX;
      ctx.fillStyle = 'rgba(0,0,0,0.45)';
      ctx.fillRect(bx - 2, byShoot - 2, bw + 4, bh + 4);
      const shf = Math.max(0, Math.min(1, shoot / SHOOT_STAMINA_MAX));
      ctx.fillStyle = shf < 0.2 ? '#c45c2a' : '#f0b429';
      ctx.fillRect(bx, byShoot, bw * shf, bh);
    }
  }

  resize();
  requestAnimationFrame(draw);
  connect();
</script>
</body>
