<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AIM4 Football</title>
<style>
  :root {
    --bg: #0f0f10;
    --panel: #1a1a1c;
    --panel2: #232326;
    --text: #f2f2f2;
    --dim: #9a9aa0;
    --accent: #e63946;
    --red: #ff5544;
    --blue: #4da3ff;
    --green: #37b26c;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    overflow: hidden;
    user-select: none;
  }
  .view { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; }
  .hidden { display: none !important; }

  h1 { font-size: 44px; letter-spacing: 1px; }
  h1 span { color: var(--accent); }
  .tag { color: var(--dim); font-size: 13px; margin-top: -10px; }

  input, button {
    font: inherit;
    color: var(--text);
    border-radius: 8px;
    border: 1px solid #333;
    background: var(--panel);
    padding: 10px 16px;
    outline: none;
  }
  input { width: 240px; text-align: center; }
  input:focus { border-color: #555; }
  button { cursor: pointer; background: var(--panel2); border: 1px solid #3a3a3e; }
  button:hover { background: #2c2c30; }
  button.primary { background: var(--accent); border-color: var(--accent); font-weight: 600; }
  button.primary:hover { filter: brightness(1.1); }
  button:disabled { opacity: 0.4; cursor: default; }
  .row { display: flex; gap: 8px; }
  .row input { width: 120px; text-transform: uppercase; }
  #menuMsg, #lobbyMsg { color: var(--accent); font-size: 13px; min-height: 18px; }

  /* ---- Lobby ---- */
  #lobby { justify-content: flex-start; padding: 40px 20px; }
  .codeLine { display: flex; align-items: baseline; gap: 12px; }
  .codeLine .code {
    font-size: 40px; font-weight: 700; letter-spacing: 8px; color: var(--text);
    background: var(--panel); border: 1px solid #333; border-radius: 10px; padding: 4px 10px 4px 18px;
    cursor: pointer;
  }
  .codeLine .code:hover { border-color: #666; }
  .hint { color: var(--dim); font-size: 12px; }

  .teams { display: flex; gap: 14px; width: min(900px, 94vw); flex: 0 1 auto; margin-top: 10px; }
  .col {
    flex: 1; background: var(--panel); border: 1px solid #2c2c30; border-radius: 12px;
    padding: 12px; min-height: 300px; display: flex; flex-direction: column; gap: 8px;
    transition: border-color 0.1s, background 0.1s;
  }
  .col h2 { font-size: 14px; letter-spacing: 2px; text-align: center; padding-bottom: 6px; border-bottom: 1px solid #2c2c30; }
  .col[data-team="red"] h2 { color: var(--red); }
  .col[data-team="blue"] h2 { color: var(--blue); }
  .col[data-team="spec"] h2 { color: var(--dim); }
  .col.dropOk { border-color: var(--green); background: #1d241f; }
  .col .list { flex: 1; display: flex; flex-direction: column; gap: 6px; }
  .chip {
    background: var(--panel2); border: 1px solid #3a3a3e; border-radius: 8px;
    padding: 8px 10px; font-size: 14px; display: flex; align-items: center; gap: 8px;
  }
  .chip.draggable { cursor: grab; }
  .chip.dragging { opacity: 0.4; }
  .chip .dot { width: 10px; height: 10px; border-radius: 50%; background: #666; flex: none; }
  .chip[data-team="red"] .dot { background: var(--red); }
  .chip[data-team="blue"] .dot { background: var(--blue); }
  .chip .crown { margin-left: auto; font-size: 12px; }
  .chip.me { border-color: #5a5a60; }
  .col > button { font-size: 12px; padding: 7px; }
  .lobbyFoot { display: flex; gap: 10px; align-items: center; margin-top: 8px; }
  .controlsHint { color: var(--dim); font-size: 12px; text-align: center; max-width: 640px; line-height: 1.7; }
  kbd {
    background: var(--panel2); border: 1px solid #3f3f44; border-bottom-width: 2px;
    border-radius: 4px; padding: 1px 6px; font-family: inherit; font-size: 11px; color: var(--text);
  }

  /* ---- Game ---- */
  #game { background: #0c1210; }
  #cv { position: absolute; inset: 0; width: 100%; height: 100%; }
  #banner {
    position: absolute; top: 18%; left: 0; right: 0; text-align: center;
    font-size: 56px; font-weight: 800; letter-spacing: 3px;
    text-shadow: 0 4px 24px rgba(0,0,0,0.7); pointer-events: none;
  }
  #endOverlay {
    position: absolute; inset: 0; background: rgba(10,10,12,0.82);
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px;
  }
  #endOverlay .big { font-size: 52px; font-weight: 800; }
  #endOverlay .sub { color: var(--dim); }
</style>
</head>
<body>

<!-- ===================== MENU ===================== -->
<div id="menu" class="view">
  <h1>AIM4 <span>FOOTBALL</span></h1>
  <div class="tag">easter egg &mdash; 2D multiplayer football</div>
  <input id="nameInput" maxlength="16" placeholder="Your name" autocomplete="off">
  <button id="createBtn" class="primary">Create lobby</button>
  <div class="row">
    <input id="codeInput" maxlength="4" placeholder="CODE" autocomplete="off">
    <button id="joinBtn">Join</button>
  </div>
  <div id="menuMsg"></div>
</div>

<!-- ===================== LOBBY ===================== -->
<div id="lobby" class="view hidden">
  <div class="codeLine">
    <div class="code" id="codeLabel" title="Click to copy invite link">----</div>
  </div>
  <div class="hint" id="copyHint">click the code to copy an invite link</div>
  <div class="teams">
    <div class="col" data-team="red">
      <h2>RED</h2>
      <div class="list"></div>
      <button data-selfjoin="red">Join red</button>
    </div>
    <div class="col" data-team="spec">
      <h2>SPECTATORS</h2>
      <div class="list"></div>
      <button data-selfjoin="spec">Spectate</button>
    </div>
    <div class="col" data-team="blue">
      <h2>BLUE</h2>
      <div class="list"></div>
      <button data-selfjoin="blue">Join blue</button>
    </div>
  </div>
  <div class="controlsHint">
    <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> move &nbsp;·&nbsp; mouse aims &nbsp;·&nbsp;
    hold <kbd>SPACE</kbd> to shoot — the ball rolls to your cursor, so mouse distance = shot power &nbsp;·&nbsp;
    hold <kbd>SHIFT</kbd> to sprint (10&nbsp;s stamina) &nbsp;·&nbsp; first to 5 goals
    <br><span id="hostHint"></span>
  </div>
  <div class="lobbyFoot">
    <button id="startBtn" class="primary">Start match</button>
    <button id="leaveBtn">Leave</button>
  </div>
  <div id="lobbyMsg"></div>
</div>

<!-- ===================== GAME ===================== -->
<div id="game" class="view hidden">
  <canvas id="cv"></canvas>
  <div id="banner" class="hidden"></div>
  <div id="endOverlay" class="hidden">
    <div class="big" id="endScore"></div>
    <div class="sub" id="endSub"></div>
  </div>
</div>

<script>
(() => {
  'use strict';

  // ---- Constants mirrored from server/football.js (keep in sync) ----------
  const PLAYER_R = 1.4;
  const BALL_R = 1.0;
  const BALL_FRICTION = 0.9;
  const KICK_MIN = 8, KICK_MAX = 55;
  const KICK_RANGE = PLAYER_R + BALL_R + 1.2;
  const STAMINA_MAX = 10;
  const INTERP_MS = 120;

  const TEAM_COLOR = { red: '#ff5544', blue: '#4da3ff' };

  // ---- DOM ------------------------------------------------------------------
  const $ = (id) => document.getElementById(id);
  const views = { menu: $('menu'), lobby: $('lobby'), game: $('game') };
  const nameInput = $('nameInput');
  const codeInput = $('codeInput');
  const menuMsg = $('menuMsg');
  const lobbyMsg = $('lobbyMsg');
  const codeLabel = $('codeLabel');
  const copyHint = $('copyHint');
  const startBtn = $('startBtn');
  const hostHint = $('hostHint');
  const banner = $('banner');
  const endOverlay = $('endOverlay');
  const cv = $('cv');
  const ctx = cv.getContext('2d');

  nameInput.value = localStorage.getItem('aim4-football-name') || '';

  function show(name) {
    for (const k in views) views[k].classList.toggle('hidden', k !== name);
  }

  // ---- Networking -------------------------------------------------------------
  let ws = null;
  let myId = null;
  let lobby = null; // last lobby message
  let roster = new Map(); // id -> {name, team} during a match
  let field = { w: 100, h: 62, gt: 23, gb: 39, gd: 3 };
  let goalsToWin = 5;
  let snaps = []; // interpolation buffer [{rt, s}]
  let lastKicks = []; // kick flashes [{x,y,p,rt}]
  let ballTrail = [];
  let inGame = false;

  function wsUrl() {
    const q = new URLSearchParams(location.search).get('server');
    const host = q ? q.replace(/^https?:\/\//, '').replace(/\/$/, '') : location.host;
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    return `${proto}://${host}/football`;
  }

  function connect(onOpen) {
    if (ws && ws.readyState <= 1) { onOpen(); return; }
    menuMsg.textContent = 'Connecting…';
    ws = new WebSocket(wsUrl());
    ws.onopen = () => { menuMsg.textContent = ''; onOpen(); };
    ws.onclose = () => {
      ws = null;
      myId = null;
      lobby = null;
      inGame = false;
      show('menu');
      menuMsg.textContent = 'Disconnected from server (is the backend running? try npm run dev:mp)';
    };
    ws.onmessage = (ev) => {
      let msg;
      try { msg = JSON.parse(ev.data); } catch { return; }
      handle(msg);
    };
  }

  function send(obj) {
    if (ws && ws.readyState === 1) ws.send(JSON.stringify(obj));
  }

  function handle(msg) {
    switch (msg.t) {
      case 'welcome':
        myId = msg.id;
        break;
      case 'error':
        (views.menu.classList.contains('hidden') ? lobbyMsg : menuMsg).textContent = msg.msg;
        break;
      case 'lobby':
        lobby = msg;
        roster = new Map(msg.players.map((p) => [p.id, p]));
        if (!inGame) { show('lobby'); renderLobby(); }
        break;
      case 'start':
        field = msg.field;
        goalsToWin = msg.goalsToWin;
        roster = new Map(msg.players.map((p) => [p.id, p]));
        snaps = [];
        ballTrail = [];
        lastKicks = [];
        inGame = true;
        endOverlay.classList.add('hidden');
        banner.classList.add('hidden');
        show('game');
        resize();
        break;
      case 'state':
        snaps.push({ rt: performance.now(), s: msg });
        if (snaps.length > 12) snaps.shift();
        break;
      case 'kick':
        lastKicks.push({ x: msg.x, y: msg.y, p: msg.p, rt: performance.now() });
        break;
      case 'goal': {
        const who = msg.byName ? (msg.og ? `${msg.byName} (own goal!)` : msg.byName) : '';
        banner.innerHTML =
          `<span style="color:${TEAM_COLOR[msg.team]}">GOAL!</span>` +
          (who ? `<div style="font-size:22px;font-weight:600;margin-top:6px">${escapeHtml(who)}</div>` : '');
        banner.classList.remove('hidden');
        setTimeout(() => banner.classList.add('hidden'), 2000);
        break;
      }
      case 'end': {
        inGame = false;
        const w = msg.winner;
        $('endScore').innerHTML =
          `<span style="color:${TEAM_COLOR.red}">${msg.score.red}</span>` +
          ` &mdash; ` +
          `<span style="color:${TEAM_COLOR.blue}">${msg.score.blue}</span>`;
        $('endSub').textContent = msg.aborted
          ? 'Match stopped by host — returning to lobby…'
          : w ? `${w.toUpperCase()} wins! Returning to lobby…` : 'Returning to lobby…';
        endOverlay.classList.remove('hidden');
        setTimeout(() => {
          endOverlay.classList.add('hidden');
          if (lobby) { show('lobby'); renderLobby(); }
        }, 3000);
        break;
      }
    }
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, (c) => (
      { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]
    ));
  }

  // ---- Menu actions -------------------------------------------------------------
  function myName() {
    const n = nameInput.value.trim().slice(0, 16);
    if (n) localStorage.setItem('aim4-football-name', n);
    return n || 'Player';
  }
  $('createBtn').onclick = () => connect(() => send({ t: 'create', name: myName() }));
  $('joinBtn').onclick = () => {
    const code = codeInput.value.trim().toUpperCase();
    if (code.length !== 4) { menuMsg.textContent = 'Enter a 4-letter code'; return; }
    connect(() => send({ t: 'join', code, name: myName() }));
  };
  codeInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') $('joinBtn').click(); });

  // Invite links: football.html?join=CODE
  const joinCode = new URLSearchParams(location.search).get('join');
  if (joinCode) codeInput.value = joinCode.toUpperCase().slice(0, 4);

  // ---- Lobby --------------------------------------------------------------------
  const isHost = () => lobby && lobby.hostId === myId;

  codeLabel.onclick = () => {
    if (!lobby) return;
    const url = `${location.origin}${location.pathname}?join=${lobby.code}`;
    navigator.clipboard?.writeText(url).then(
      () => { copyHint.textContent = 'invite link copied!'; setTimeout(() => (copyHint.textContent = 'click the code to copy an invite link'), 1600); },
      () => { copyHint.textContent = url; }
    );
  };

  $('leaveBtn').onclick = () => { send({ t: 'leave' }); lobby = null; show('menu'); };
  startBtn.onclick = () => send({ t: 'start' });
  document.querySelectorAll('[data-selfjoin]').forEach((b) => {
    b.onclick = () => send({ t: 'team', team: b.dataset.selfjoin });
  });

  function renderLobby() {
    if (!lobby) return;
    codeLabel.textContent = lobby.code;
    lobbyMsg.textContent = '';
    startBtn.classList.toggle('hidden', !isHost());
    hostHint.textContent = isHost()
      ? 'You are the host — drag players between columns to set teams.'
      : 'Pick a team below. The host can also drag you to a team.';

    document.querySelectorAll('.col').forEach((col) => {
      const list = col.querySelector('.list');
      list.innerHTML = '';
      for (const p of lobby.players) {
        if (p.team !== col.dataset.team) continue;
        const chip = document.createElement('div');
        chip.className = 'chip';
        chip.dataset.team = p.team;
        if (p.id === myId) chip.classList.add('me');
        const canDrag = isHost() || p.id === myId;
        if (canDrag) {
          chip.classList.add('draggable');
          chip.draggable = true;
          chip.addEventListener('dragstart', (e) => {
            e.dataTransfer.setData('text/plain', String(p.id));
            e.dataTransfer.effectAllowed = 'move';
            chip.classList.add('dragging');
          });
          chip.addEventListener('dragend', () => chip.classList.remove('dragging'));
        }
        chip.innerHTML =
          `<span class="dot"></span>${escapeHtml(p.name)}${p.id === myId ? ' (you)' : ''}` +
          (p.id === lobby.hostId ? '<span class="crown" title="Host">&#128081;</span>' : '');
        list.appendChild(chip);
      }
    });
  }

  // Drop targets: the three team columns.
  document.querySelectorAll('.col').forEach((col) => {
    col.addEventListener('dragover', (e) => { e.preventDefault(); col.classList.add('dropOk'); });
    col.addEventListener('dragleave', () => col.classList.remove('dropOk'));
    col.addEventListener('drop', (e) => {
      e.preventDefault();
      col.classList.remove('dropOk');
      const id = Number(e.dataTransfer.getData('text/plain'));
      if (!id) return;
      const team = col.dataset.team;
      if (id === myId && !isHost()) send({ t: 'team', team });
      else if (isHost()) send({ t: 'setTeam', id, team });
    });
  });

  // ---- Game input -----------------------------------------------------------------
  const keys = { u: false, d: false, l: false, r: false, sp: false, k: false };
  let mouse = { x: 0, y: 0 };

  const KEYMAP = {
    KeyW: 'u', ArrowUp: 'u',
    KeyS: 'd', ArrowDown: 'd',
    KeyA: 'l', ArrowLeft: 'l',
    KeyD: 'r', ArrowRight: 'r',
    Space: 'k',
    ShiftLeft: 'sp', ShiftRight: 'sp'
  };
  window.addEventListener('keydown', (e) => {
    const k = KEYMAP[e.code];
    if (!k || !inGame) return;
    keys[k] = true;
    e.preventDefault();
  });
  window.addEventListener('keyup', (e) => {
    const k = KEYMAP[e.code];
    if (!k) return;
    keys[k] = false;
  });
  window.addEventListener('blur', () => { for (const k in keys) keys[k] = false; });
  window.addEventListener('mousemove', (e) => { mouse.x = e.clientX; mouse.y = e.clientY; });

  // Send inputs at ~30 Hz while in a match.
  setInterval(() => {
    if (!inGame || !ws || ws.readyState !== 1) return;
    const aim = screenToField(mouse.x, mouse.y);
    send({ t: 'input', u: keys.u, d: keys.d, l: keys.l, r: keys.r, sp: keys.sp, k: keys.k, ax: aim.x, ay: aim.y });
  }, 33);

  // ---- View transform ----------------------------------------------------------
  let sc = 1, ox = 0, oy = 0;

  function resize() {
    const dpr = window.devicePixelRatio || 1;
    cv.width = Math.floor(innerWidth * dpr);
    cv.height = Math.floor(innerHeight * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    const pad = 10;
    sc = Math.min(innerWidth / (field.w + field.gd * 2 + pad), innerHeight / (field.h + pad + 8));
    ox = (innerWidth - field.w * sc) / 2;
    oy = (innerHeight - field.h * sc) / 2 + 8;
  }
  window.addEventListener('resize', resize);

  const px = (x) => ox + x * sc;
  const py = (y) => oy + y * sc;
  function screenToField(mx, my) {
    return { x: (mx - ox) / sc, y: (my - oy) / sc };
  }

  // ---- Interpolated state --------------------------------------------------------
  function sampleState() {
    if (!snaps.length) return null;
    const rt = performance.now() - INTERP_MS;
    let a = snaps[0], b = snaps[0];
    for (let i = 0; i < snaps.length; i++) {
      if (snaps[i].rt <= rt) a = snaps[i];
      if (snaps[i].rt >= rt) { b = snaps[i]; break; }
      b = snaps[i];
    }
    const span = b.rt - a.rt;
    const f = span > 0 ? Math.min(1, Math.max(0, (rt - a.rt) / span)) : 1;
    const lerp = (u, v) => u + (v - u) * f;

    const players = new Map();
    for (const q of b.s.pl) players.set(q.i, { ...q });
    for (const q of a.s.pl) {
      const cur = players.get(q.i);
      if (cur) { cur.x = lerp(q.x, cur.x); cur.y = lerp(q.y, cur.y); }
    }
    return {
      ph: b.s.ph,
      kt: b.s.kt,
      sc: b.s.sc,
      ball: { x: lerp(a.s.ball.x, b.s.ball.x), y: lerp(a.s.ball.y, b.s.ball.y) },
      players
    };
  }

  // ---- Rendering ------------------------------------------------------------------
  function draw() {
    requestAnimationFrame(draw);
    if (!inGame) return;
    const st = sampleState();
    ctx.clearRect(0, 0, innerWidth, innerHeight);
    drawPitch();
    if (!st) return;

    // Ball trail.
    ballTrail.push({ x: st.ball.x, y: st.ball.y });
    if (ballTrail.length > 9) ballTrail.shift();

    // Kick flashes.
    const now = performance.now();
    lastKicks = lastKicks.filter((k) => now - k.rt < 300);
    for (const k of lastKicks) {
      const f = 1 - (now - k.rt) / 300;
      ctx.beginPath();
      ctx.arc(px(k.x), py(k.y), (BALL_R + 2.5 * (1 - f)) * sc, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(255,255,255,${0.5 * f})`;
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    // Players.
    const me = st.players.get(myId);
    for (const [id, q] of st.players) {
      const info = roster.get(id);
      const color = TEAM_COLOR[info?.team] || '#888';
      // shadow
      ctx.beginPath();
      ctx.ellipse(px(q.x), py(q.y) + PLAYER_R * sc * 0.45, PLAYER_R * sc * 0.95, PLAYER_R * sc * 0.5, 0, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(0,0,0,0.25)';
      ctx.fill();
      // body
      ctx.beginPath();
      ctx.arc(px(q.x), py(q.y), PLAYER_R * sc, 0, Math.PI * 2);
      ctx.fillStyle = color;
      ctx.fill();
      ctx.lineWidth = id === myId ? 3 : 1.5;
      ctx.strokeStyle = id === myId ? '#ffffff' : 'rgba(0,0,0,0.35)';
      ctx.stroke();
      // sprint ring
      if (q.r) {
        ctx.beginPath();
        ctx.arc(px(q.x), py(q.y), (PLAYER_R + 0.45) * sc, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(255,255,255,0.35)';
        ctx.lineWidth = 1.5;
        ctx.stroke();
      }
      // name
      ctx.font = `600 ${Math.max(11, sc * 1.1)}px Segoe UI, sans-serif`;
      ctx.textAlign = 'center';
      ctx.fillStyle = id === myId ? '#fff' : 'rgba(255,255,255,0.8)';
      ctx.fillText(info?.name || '?', px(q.x), py(q.y) - (PLAYER_R + 1.1) * sc);
    }

    // Aim indicator (self, field players only).
    if (me) {
      const aim = screenToField(mouse.x, mouse.y);
      const dx = aim.x - st.ball.x;
      const dy = aim.y - st.ball.y;
      const dist = Math.hypot(dx, dy);
      const power = Math.min(1, Math.max(0, (dist * BALL_FRICTION - KICK_MIN) / (KICK_MAX - KICK_MIN)));
      const inReach = Math.hypot(st.ball.x - me.x, st.ball.y - me.y) <= KICK_RANGE;
      ctx.setLineDash([6, 6]);
      ctx.beginPath();
      ctx.moveTo(px(me.x), py(me.y));
      ctx.lineTo(px(aim.x), py(aim.y));
      ctx.strokeStyle = inReach ? `rgba(255,${Math.round(230 - power * 170)},80,0.55)` : 'rgba(255,255,255,0.18)';
      ctx.lineWidth = 1.5;
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.beginPath();
      ctx.arc(px(aim.x), py(aim.y), 5, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(255,255,255,0.5)';
      ctx.stroke();
    }

    // Ball (drawn over players).
    for (let i = 0; i < ballTrail.length - 1; i++) {
      const t = ballTrail[i];
      ctx.beginPath();
      ctx.arc(px(t.x), py(t.y), BALL_R * sc * (0.3 + 0.5 * (i / ballTrail.length)), 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${0.05 + 0.05 * i})`;
      ctx.fill();
    }
    ctx.beginPath();
    ctx.ellipse(px(st.ball.x), py(st.ball.y) + BALL_R * sc * 0.5, BALL_R * sc * 0.9, BALL_R * sc * 0.45, 0, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(px(st.ball.x), py(st.ball.y), BALL_R * sc, 0, Math.PI * 2);
    ctx.fillStyle = '#f5f5f5';
    ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.4)';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    drawHud(st, me);
  }

  function drawPitch() {
    const w = field.w, h = field.h;
    // grass + mowing stripes
    ctx.fillStyle = '#17351f';
    ctx.fillRect(px(-field.gd) - 6, py(0) - 6, (w + field.gd * 2) * sc + 12, h * sc + 12);
    for (let i = 0; i < 10; i++) {
      if (i % 2) continue;
      ctx.fillStyle = 'rgba(255,255,255,0.03)';
      ctx.fillRect(px((w / 10) * i), py(0), (w / 10) * sc, h * sc);
    }
    ctx.strokeStyle = 'rgba(255,255,255,0.75)';
    ctx.lineWidth = 2;
    // boundary + halfway + centre circle
    ctx.strokeRect(px(0), py(0), w * sc, h * sc);
    ctx.beginPath();
    ctx.moveTo(px(w / 2), py(0));
    ctx.lineTo(px(w / 2), py(h));
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(px(w / 2), py(h / 2), 9 * sc, 0, Math.PI * 2);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(px(w / 2), py(h / 2), 2.5, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.75)';
    ctx.fill();
    // penalty boxes
    const boxH = 30, boxW = 14;
    ctx.strokeRect(px(0), py((h - boxH) / 2), boxW * sc, boxH * sc);
    ctx.strokeRect(px(w - boxW), py((h - boxH) / 2), boxW * sc, boxH * sc);
    // goals (net boxes outside the lines)
    for (const side of [0, 1]) {
      const gx = side === 0 ? -field.gd : w;
      ctx.fillStyle = 'rgba(255,255,255,0.06)';
      ctx.fillRect(px(gx), py(field.gt), field.gd * sc, (field.gb - field.gt) * sc);
      ctx.strokeStyle = side === 0 ? TEAM_COLOR.red : TEAM_COLOR.blue;
      ctx.lineWidth = 3;
      ctx.strokeRect(px(gx), py(field.gt), field.gd * sc, (field.gb - field.gt) * sc);
      // net cross-hatch
      ctx.strokeStyle = 'rgba(255,255,255,0.12)';
      ctx.lineWidth = 1;
      for (let yy = field.gt + 2; yy < field.gb; yy += 2) {
        ctx.beginPath();
        ctx.moveTo(px(gx), py(yy));
        ctx.lineTo(px(gx + field.gd), py(yy));
        ctx.stroke();
      }
    }
  }

  function drawHud(st, me) {
    // Score bar.
    ctx.textAlign = 'center';
    ctx.font = '800 26px Segoe UI, sans-serif';
    ctx.fillStyle = TEAM_COLOR.red;
    ctx.fillText(String(st.sc.red), innerWidth / 2 - 44, 34);
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.fillText('–', innerWidth / 2, 34);
    ctx.fillStyle = TEAM_COLOR.blue;
    ctx.fillText(String(st.sc.blue), innerWidth / 2 + 44, 34);
    ctx.font = '600 11px Segoe UI, sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.45)';
    ctx.fillText(`first to ${goalsToWin}`, innerWidth / 2, 50);

    // Kickoff countdown.
    if (st.ph === 'kickoff') {
      ctx.font = '800 40px Segoe UI, sans-serif';
      ctx.fillStyle = 'rgba(255,255,255,0.9)';
      ctx.fillText(st.kt > 500 ? String(Math.ceil(st.kt / 1000)) : 'GO!', innerWidth / 2, innerHeight / 2 - 60);
    }

    // Stamina bar (self only).
    if (me) {
      const bw = 220, bh = 10;
      const bx = (innerWidth - bw) / 2;
      const by = innerHeight - 34;
      ctx.fillStyle = 'rgba(0,0,0,0.45)';
      ctx.fillRect(bx - 2, by - 2, bw + 4, bh + 4);
      const f = Math.max(0, Math.min(1, me.s / STAMINA_MAX));
      ctx.fillStyle = me.w ? '#e6a23c' : (keys.sp ? '#6fe3a1' : '#37b26c');
      ctx.fillRect(bx, by, bw * f, bh);
      ctx.font = '600 10px Segoe UI, sans-serif';
      ctx.fillStyle = 'rgba(255,255,255,0.6)';
      ctx.fillText(me.w ? 'WINDED — recover to sprint' : 'SPRINT STAMINA (hold SHIFT)', innerWidth / 2, by - 6);
    } else if (roster.get(myId)?.team === 'spec' || !roster.get(myId)) {
      ctx.font = '600 12px Segoe UI, sans-serif';
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      ctx.fillText('spectating', innerWidth / 2, innerHeight - 24);
    }
  }

  resize();
  requestAnimationFrame(draw);
})();
</script>
</body>
</html>
