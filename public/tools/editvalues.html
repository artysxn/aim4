<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>Aim4 — Rating Baselines</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 28px;
    background: #0a0a0a; color: #e3e3e3;
    font: 14px/1.5 "Host Grotesk", system-ui, sans-serif;
  }
  h1 { font-size: 22px; margin: 0 0 4px; }
  p.sub { color: #888; margin: 0 0 20px; }
  .bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
  button {
    background: #1c1c1c; color: #e3e3e3; border: 1px solid #333;
    padding: 8px 14px; cursor: pointer; font: inherit;
  }
  button:hover { background: #262626; }
  button.primary { background: #f52525; border-color: #f52525; color: #fff; }
  button.primary:hover { background: #d31f1f; }
  table { border-collapse: collapse; width: 100%; max-width: 1100px; }
  th, td { border: 1px solid #262626; padding: 6px 8px; text-align: left; }
  th { background: #141414; position: sticky; top: 0; font-weight: 500; }
  td.mode { font-weight: 500; white-space: nowrap; }
  input[type=number] {
    width: 92px; background: #111; color: #e3e3e3; border: 1px solid #333;
    padding: 5px 6px; font: inherit;
  }
  input:focus { outline: none; border-color: #f52525; }
  #status { margin-top: 16px; color: #6fcf6f; min-height: 20px; }
  #status.err { color: #f56b6b; }
  .note { color: #777; font-size: 12px; margin-top: 6px; max-width: 1100px; }
</style>
</head>
<body>
  <h1>Aim4 — Rating Baselines</h1>
  <p class="sub">Per-gamemode baseline (B = a 1.00 rating). Precision uses a fixed curve and has no baseline. Saved on the server (<code>/api/baselines</code>) and used by everyone's Aim4 Rating radar.</p>

  <div class="bar">
    <button class="primary" id="save">Save to server</button>
    <button id="reload">Reload from server</button>
    <button id="reset">Reset to defaults</button>
  </div>

  <table id="grid"></table>

  <div id="status"></div>
  <p class="note">Changes go live for all players once saved — the game fetches these baselines from the server.</p>

<script>
  const PREFIX = 'aimtrainer:';
  const KEY = 'aim4Baselines'; // localStorage mirror (offline fallback for the game)
  const API = '/api/baselines';
  const GAMEMODES = [
    'gridshot','stars','bounce','microflicks','pasu','spidershot','survival',
    'arena','tracking',
    'sequence','double','ball','bouncetracking','pasutracking','turn'
  ];
  const LABELS = {
    gridshot:'Gridshot', stars:'Stars', bounce:'Bounce (Clicks)', microflicks:'Microflicks',
    pasu:'Pasu (Clicks)', spidershot:'Spidershot', survival:'Survival', arena:'Crossfire',
    tracking:'Strafes',
    sequence:'Sequence', double:'Double', ball:'Ball',
    bouncetracking:'Bounce (Tracking)', pasutracking:'Pasu (Tracking)', turn:'Turn'
  };
  const BASELINE_KEYS = ['speed','tracking','flicks_hit_percent','adjustments','reaction_time_ms','tension_percent'];
  const KEY_LABELS = {
    speed:'Speed (°/s)', tracking:'Tracking (0–1)', flicks_hit_percent:'Flicks hit %',
    adjustments:'Adjustments /target', reaction_time_ms:'Reaction ms', tension_percent:'Tension %'
  };
  const DEFAULT = { speed:44.0, tracking:0.5, flicks_hit_percent:50.0, adjustments:2.0, reaction_time_ms:200.0, tension_percent:40.0 };

  function defaults() {
    const o = {};
    for (const g of GAMEMODES) o[g] = { ...DEFAULT };
    return o;
  }
  function mergeOver(base, saved) {
    if (saved && typeof saved === 'object') {
      for (const g of GAMEMODES) base[g] = { ...base[g], ...(saved[g] || {}) };
    }
    return base;
  }
  function setStatus(msg, err) {
    const el = document.getElementById('status');
    el.textContent = msg;
    el.className = err ? 'err' : '';
  }

  let config = defaults();

  async function loadFromServer() {
    const res = await fetch(API);
    if (!res.ok) throw new Error('Server responded ' + res.status);
    const data = await res.json();
    return mergeOver(defaults(), data.baselines);
  }

  function render() {
    const t = document.getElementById('grid');
    let head = '<tr><th>Gamemode</th>';
    for (const k of BASELINE_KEYS) head += `<th>${KEY_LABELS[k]}</th>`;
    head += '</tr>';
    let rows = '';
    for (const g of GAMEMODES) {
      rows += `<tr><td class="mode">${LABELS[g]}</td>`;
      for (const k of BASELINE_KEYS) {
        rows += `<td><input type="number" step="any" data-g="${g}" data-k="${k}" value="${config[g][k]}" /></td>`;
      }
      rows += '</tr>';
    }
    t.innerHTML = head + rows;
    t.querySelectorAll('input').forEach((inp) => {
      inp.addEventListener('change', () => {
        const v = parseFloat(inp.value);
        if (Number.isFinite(v)) config[inp.dataset.g][inp.dataset.k] = v;
      });
    });
  }

  document.getElementById('save').onclick = async () => {
    try {
      const res = await fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ baselines: config })
      });
      const data = await res.json().catch(() => null);
      if (!res.ok) throw new Error(data?.error || 'Server responded ' + res.status);
      // Mirror locally so the game keeps working offline with the same values.
      try { localStorage.setItem(PREFIX + KEY, JSON.stringify(config)); } catch {}
      setStatus('Saved to the server. All players now rate against these baselines.');
    } catch (e) { setStatus('Save failed: ' + e.message, true); }
  };
  document.getElementById('reload').onclick = async () => {
    try {
      config = await loadFromServer();
      render();
      setStatus('Reloaded from the server.');
    } catch (e) { setStatus('Reload failed: ' + e.message, true); }
  };
  document.getElementById('reset').onclick = () => {
    config = defaults();
    render();
    setStatus('Reset to defaults (not yet saved).');
  };

  (async () => {
    try {
      config = await loadFromServer();
      setStatus('Loaded server baselines.');
    } catch (e) {
      // Fall back to the local mirror so the editor still opens offline.
      try { config = mergeOver(defaults(), JSON.parse(localStorage.getItem(PREFIX + KEY) || 'null')); } catch {}
      setStatus('Could not reach the server (' + e.message + ') — showing local values.', true);
    }
    render();
  })();
</script>
</body>
</html>
